<!DOCTYPE html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#ebeef0",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "on-primary-container": "#003a67",
              "outline-variant": "#c0c7d4",
              "on-background": "#181c1e",
              "surface-dim": "#d7dadc",
              "primary-container": "#4da6ff",
              "error": "#ba1a1a",
              "inverse-primary": "#a0caff",
              "secondary-fixed": "#e2e2e2",
              "on-surface": "#181c1e",
              "surface-container-high": "#e5e9eb",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "surface-bright": "#f7fafc",
              "surface-variant": "#e0e3e5",
              "inverse-surface": "#2d3133",
              "tertiary": "#555f71",
              "surface-container-low": "#f1f4f6",
              "outline": "#707783",
              "on-secondary": "#ffffff",
              "primary-fixed": "#d2e4ff",
              "surface": "#f7fafc",
              "on-surface-variant": "#404752",
              "primary": "#0061a5",
              "error-container": "#ffdad6",
              "primary-fixed-dim": "#a0caff",
              "background": "#f7fafc",
              "secondary-container": "#dfe0e0",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "secondary": "#5d5f5f",
              "on-secondary-container": "#616363",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              sm: "16px",
              lg: "40px",
              gutter: "24px",
              base: "4px",
              "container-max": "1280px",
              md: "24px",
              xs: "8px",
              xl: "64px",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            fontSize: {
              "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "label-sm": ["12px", { lineHeight: "14px", fontWeight: "600" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "label-md": ["14px", { lineHeight: "16px", letterSpacing: "0.01em", fontWeight: "500" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "display-lg-mobile": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
              "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; }
      .bento-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .bento-item:hover { transform: translateY(-4px); }
    </style>
  </head>
  <body class="bg-background text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
